<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <clipPath id="roundClip">
      <rect width="256" height="256" rx="48"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="#1e1e2e"/>

  <!-- Left panel (file tree) -->
  <rect x="0" y="0" width="96" height="256" fill="#181825" clip-path="url(#roundClip)"/>

  <!-- Tree: root folder icon -->
  <rect x="18" y="52" width="22" height="18" rx="4" fill="#89b4fa"/>
  <rect x="18" y="48" width="10" height="6" rx="2" fill="#89b4fa"/>
  <!-- folder label -->
  <rect x="46" y="57" width="36" height="6" rx="3" fill="#45475a"/>

  <!-- Tree: vertical stem -->
  <rect x="27" y="70" width="2.5" height="108" rx="1.5" fill="#313244"/>

  <!-- Item 1: folder -->
  <rect x="27" y="92" width="14" height="2.5" rx="1.5" fill="#313244"/>
  <rect x="43" y="86" width="16" height="14" rx="3" fill="#cba6f7"/>
  <rect x="63" y="90" width="24" height="5" rx="2.5" fill="#45475a"/>

  <!-- Item 2: file (green) -->
  <rect x="27" y="116" width="14" height="2.5" rx="1.5" fill="#313244"/>
  <rect x="44" y="110" width="12" height="15" rx="3" fill="#a6e3a1"/>
  <rect x="60" y="114" width="28" height="5" rx="2.5" fill="#45475a"/>

  <!-- Item 3: file (yellow) -->
  <rect x="27" y="140" width="14" height="2.5" rx="1.5" fill="#313244"/>
  <rect x="44" y="134" width="12" height="15" rx="3" fill="#f9e2af"/>
  <rect x="60" y="138" width="22" height="5" rx="2.5" fill="#45475a"/>

  <!-- Item 4: file (red/pink) -->
  <rect x="27" y="164" width="14" height="2.5" rx="1.5" fill="#313244"/>
  <rect x="44" y="158" width="12" height="15" rx="3" fill="#f38ba8"/>
  <rect x="60" y="162" width="26" height="5" rx="2.5" fill="#45475a"/>

  <!-- Divider -->
  <rect x="95" y="20" width="2" height="216" rx="1" fill="#313244"/>

  <!-- Right panel: terminal -->

  <!-- Tab bar -->
  <rect x="106" y="44" width="58" height="22" rx="7" fill="#313244"/>
  <rect x="168" y="44" width="40" height="22" rx="7" fill="#11111b"/>
  <!-- Tab label dots -->
  <rect x="116" y="53" width="28" height="4" rx="2" fill="#cdd6f4" opacity="0.6"/>
  <rect x="174" y="53" width="20" height="4" rx="2" fill="#45475a"/>
  <!-- + button -->
  <text x="219" y="60" font-family="monospace" font-size="18" fill="#585b70" text-anchor="middle">+</text>

  <!-- Prompt 1 -->
  <!-- > chevron -->
  <polyline points="107,94 118,101 107,108" fill="none" stroke="#a6e3a1" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- command text -->
  <rect x="124" y="97" width="96" height="6" rx="3" fill="#cdd6f4"/>

  <!-- Output lines -->
  <rect x="108" y="120" width="112" height="4" rx="2" fill="#313244"/>
  <rect x="108" y="130" width="88" height="4" rx="2" fill="#313244"/>
  <rect x="108" y="140" width="60" height="4" rx="2" fill="#313244"/>

  <!-- Prompt 2 -->
  <polyline points="107,158 118,165 107,172" fill="none" stroke="#a6e3a1" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- cursor block -->
  <rect x="124" y="158" width="10" height="16" rx="2" fill="#b4befe"/>
</svg>
